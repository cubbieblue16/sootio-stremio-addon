services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sootio
    container_name: sootio
    ports:
      - "55771:55771"
    volumes:
      - sootio-data:/app/data  # Persist SQLite cache data
    networks:
      - sootio-network
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=error
      - MAX_WORKERS=4
      - POSTGRES_POOL_SIZE=10
      - MKVDRAMA_DIRECT_PROXY_URL=${MKVDRAMA_DIRECT_PROXY_URL:-}
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 24G
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:55771/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  sootio-data:  # Named volume for persistent data

networks:
  sootio-network:
    driver: bridge
    name: sootio-network
